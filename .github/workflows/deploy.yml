name: Build and Deploy - Eduardo Mesquita

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build da aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validar arquivos da aplicação
        run: |
          echo "Validando arquivos principais..."
          test -f package.json
          test -f public/index.html
          test -f public/style.css
          test -f public/script.js
          echo "Arquivos principais encontrados em public/."

      - name: Instalar dependências
        run: npm ci

      - name: Executar build
        run: npm run build

      - name: Validar build gerado
        run: npm run validate:dist

      - name: Preparar artefato para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy no GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar aplicação
        id: deployment
        uses: actions/deploy-pages@v4
