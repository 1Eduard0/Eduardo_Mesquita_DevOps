trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: github-pages-sync

steps:
  - checkout: self
    clean: true
    fetchDepth: 0

  - script: |
      set -e

      echo "Preparando diretórios..."
      AZURE_REPO="$(pwd)"
      GITHUB_REPO="/tmp/github-repo"

      echo "Clonando repositório do GitHub fora da pasta do Azure..."
      rm -rf "$GITHUB_REPO"
      git clone https://x-access-token:$(GITHUB_TOKEN)@github.com/iYoNuttxD/daniel-musse-devops.git "$GITHUB_REPO"

      echo "Sincronizando arquivos do Azure para o GitHub, preservando .github..."
      rsync -av --delete \
        --exclude='.git' \
        --exclude='.github' \
        "$AZURE_REPO"/ "$GITHUB_REPO"/

      cd "$GITHUB_REPO"

      echo "Configurando usuário Git no repositório clonado..."
      git config user.name "Azure DevOps Pipeline"
      git config user.email "pipeline@azuredevops.local"

      echo "Verificando alterações..."
      git status

      if [ -n "$(git status --porcelain)" ]; then
        git add .
        git commit -m "Sync from Azure DevOps"
        git push origin main
      else
        echo "Nenhuma alteração para sincronizar."
      fi
    displayName: "Sincronizar Azure DevOps com GitHub preservando .github"