trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: github-pages-sync

steps:
  - checkout: self
    clean: true
    fetchDepth: 0

  - script: |
      set -e

      echo "Configurando usuário Git..."
      git config user.name "Azure DevOps Pipeline"
      git config user.email "pipeline@azuredevops.local"

      echo "Clonando repositório do GitHub..."
      git clone https://x-access-token:$(GITHUB_TOKEN)@github.com/iYoNuttxD/daniel-musse-devops.git github-repo

      echo "Sincronizando arquivos do Azure para o GitHub, preservando arquivos protegidos..."
      rsync -av --delete \
        --exclude='.git' \
        --exclude='.github' \
        --exclude='README.md' \
        ./ github-repo/

      cd github-repo

      echo "Verificando alterações..."
      git status

      if [ -n "$(git status --porcelain)" ]; then
        git add .
        git commit -m "Sync from Azure DevOps"
        git push origin main
      else
        echo "Nenhuma alteração para sincronizar."
      fi
    displayName: "Sincronizar Azure DevOps com GitHub preservando arquivos protegidos"