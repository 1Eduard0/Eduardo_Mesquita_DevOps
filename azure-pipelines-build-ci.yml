# Azure Pipeline - Build CI Completa
# Pipeline de integração contínua para o projeto Node.js.
# Executa validação de sintaxe, testes unitários, build, validação do artefato,
# smoke test HTTP e distribuição simulada por publicação de artefatos.

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/**
      - '*.md'

pr:
  branches:
    include:
      - main
      - develop

variables:
  NODE_VERSION: '20.x'
  BUILD_PORT: '3000'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: BuildCI
  displayName: 'Build CI'
  jobs:
  - job: BuildApplication
    displayName: 'Build, test and package Node.js application'
    steps:
    - checkout: self
      fetchDepth: 0

    - task: UseNode@1
      displayName: 'Use Node.js $(NODE_VERSION)'
      inputs:
        version: '$(NODE_VERSION)'

    - script: |
        node --version
        npm --version
      displayName: 'Display Node and npm versions'

    - script: |
        node -e "const pkg=require('./package.json'); const total=Object.keys(pkg.dependencies||{}).length + Object.keys(pkg.devDependencies||{}).length; process.exit(total > 0 ? 0 : 1)" \
          && npm ci --no-audit --no-fund \
          || echo "Projeto sem dependências externas. Instalação npm ignorada."
      displayName: 'Restore dependencies when needed'

    - script: npm run check
      displayName: 'Validate JavaScript syntax'

    - script: npm run test:unit
      displayName: 'Run unit tests'

    - script: npm run validate:test-artifacts
      displayName: 'Validate unit test reports'

    - task: PublishTestResults@2
      displayName: 'Publish unit test results'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'junit.xml'
        failTaskOnFailedTests: true
        testRunTitle: 'ShopMax unit tests'

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish unit test coverage'
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: 'coverage/cobertura-coverage.xml'
        pathToSources: '$(System.DefaultWorkingDirectory)'

    - script: npm run build
      displayName: 'Generate build output'

    - script: npm run validate:dist
      displayName: 'Validate dist output'

    - script: |
        PUBLIC_DIR=dist PORT=$(BUILD_PORT) node server.js &
        SERVER_PID=$!
        echo "Server started with PID $SERVER_PID"
        sleep 2
        PORT=$(BUILD_PORT) npm run smoke
        kill $SERVER_PID
      displayName: 'Smoke test generated build'

    - script: |
        mkdir -p artifact/shopmax
        cp -r dist artifact/shopmax/dist
        cp server.js package.json README.md artifact/shopmax/
        cp -r coverage artifact/shopmax/coverage
        cp junit.xml artifact/shopmax/junit.xml
        tar -czf shopmax-build-$(Build.BuildId).tar.gz -C artifact shopmax
        ls -lh shopmax-build-$(Build.BuildId).tar.gz
      displayName: 'Package build artifact'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish packaged application'
      inputs:
        PathtoPublish: 'shopmax-build-$(Build.BuildId).tar.gz'
        ArtifactName: 'shopmax-build-ci'
        publishLocation: 'Container'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish dist folder'
      inputs:
        PathtoPublish: 'dist'
        ArtifactName: 'shopmax-dist'
        publishLocation: 'Container'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish test and coverage reports'
      inputs:
        PathtoPublish: 'coverage'
        ArtifactName: 'shopmax-coverage'
        publishLocation: 'Container'
