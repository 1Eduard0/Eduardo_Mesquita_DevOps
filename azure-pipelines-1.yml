# Azure Pipeline - CI (Build e Testes)
# Pipeline focado em testes unitários

trigger:
  branches:
    include:
      - '*'
  paths:
    exclude:
      - README.md
      - docs/**
      - '*.md'

pr:
  branches:
    include:
      - main
      - develop

variables:
  nodeVersion: '20.x'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: BuildAndTest
    displayName: 'Build, Test and Code Analysis'
    jobs:
      - job: BuildAndTest
        displayName: 'Build and Run Tests'
        steps:
          # ========================================
          # Setup
          # ========================================
          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: $(nodeVersion)
          
          - script: |
              node --version
              npm --version
            displayName: 'Display Node and NPM versions'
          
          # ========================================
          # Install Dependencies
          # ========================================
          - script: |
              npm ci
            displayName: 'Install Dependencies'
          
          # ========================================
          # Lint (if configured)
          # ========================================
          - script: |
              npm run lint --if-present
            displayName: 'Run Linter'
            continueOnError: true
          
          # ========================================
          # Build
          # ========================================
          - script: |
              npm run build
            displayName: 'Build TypeScript'
          
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifacts'
            inputs:
              PathtoPublish: 'dist'
              ArtifactName: 'dist'
              publishLocation: 'Container'
          
          # ========================================
          # Unit Tests
          # ========================================
          - script: |
              npm test -- --ci --coverage --coverageReporters="json" --coverageReporters="lcov" --coverageReporters="text" --coverageReporters="cobertura" --maxWorkers=2
            displayName: 'Run Unit Tests with Coverage'
          
          # ========================================
          # Publish Test Results
          # ========================================
          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/junit.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              mergeTestResults: true
              failTaskOnFailedTests: true
              testRunTitle: 'Unit Tests - $(Build.SourceBranchName)'
              publishRunAttachments: true
          
          # ========================================
          # Publish Code Coverage
          # ========================================
          - task: PublishCodeCoverageResults@1
            displayName: 'Publish Code Coverage Results'
            condition: succeededOrFailed()
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml'
              reportDirectory: '$(System.DefaultWorkingDirectory)/coverage'
              failIfCoverageEmpty: false
          
          # ========================================
          # Check Coverage Threshold
          # ========================================
          - script: |
              echo "Checking code coverage threshold..."
              
              if [ -f coverage/coverage-summary.json ]; then
                coverage=$(node -pe "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json')).total.lines.pct")
                echo "Current coverage: $coverage%"
                
                threshold=80
                if (( $(echo "$coverage >= $threshold" | bc -l) )); then
                  echo "✓ Coverage meets threshold ($coverage% >= $threshold%)"
                else
                  echo "✗ Coverage below threshold ($coverage% < $threshold%)"
                  echo "##vso[task.logissue type=warning]Code coverage is below threshold: $coverage%"
                fi
              else
                echo "Coverage summary not found"
              fi
            displayName: 'Verify Coverage Threshold'
            condition: succeededOrFailed()
          
          
          
          # ========================================
          # Archive Test Results
          # ========================================
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Coverage Report'
            condition: succeededOrFailed()
            inputs:
              PathtoPublish: 'coverage'
              ArtifactName: 'coverage-report'
              publishLocation: 'Container'
          
          # ========================================
          # Summary
          # ========================================
          - script: |
              echo "================================================"
              echo "Build and Test Summary"
              echo "================================================"
              echo "Build ID: $(Build.BuildId)"
              echo "Build Number: $(Build.BuildNumber)"
              echo "Branch: $(Build.SourceBranchName)"
              echo "Commit: $(Build.SourceVersion)"
              echo "================================================"
              
              if [ -f coverage/coverage-summary.json ]; then
                echo "Coverage Summary:"
                node -pe "
                  const summary = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json'));
                  'Lines: ' + summary.total.lines.pct + '%\n' +
                  'Statements: ' + summary.total.statements.pct + '%\n' +
                  'Functions: ' + summary.total.functions.pct + '%\n' +
                  'Branches: ' + summary.total.branches.pct + '%'
                "
              fi
              
              echo "================================================"
            displayName: 'Build Summary'
            condition: always()
